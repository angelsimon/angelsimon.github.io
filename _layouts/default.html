<!DOCTYPE html>
<html lang="es-ar">
<head>
  <meta charset="utf-8">
  <link rel="icon" type="image/png" href="{{site.baseurl}}/public/favicon.ico" />
  <meta http-equiv="Content-Language" content="es"/>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% if page.title %}{{ page.title }}{% else %}{{ site.name }}{% endif %}</title>
  
  <link rel="stylesheet" href="{{ site.baseurl }}/style.css">
  <script src="//ajax.googleapis.com/ajax/libs/jquery/2.0.0/jquery.min.js"></script>
  <meta content="{{ site.name }}" property="og:site_name">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:site" content="@void" />
  <meta name="twitter:creator" content="@void" />
    {% if page.title %}
      <meta content="{{ page.title }}" property="og:title">
      <meta name="twitter:title" content="{{ page.title }}">
    {% else %}
      <meta content="{{ site.title }}" property="og:title">
      <meta name="twitter:title" content="{{ site.title }}">
    {% endif %}
    {% if page.title %}
      <meta content="article" property="og:type">
    {% else %}
      <meta content="website" property="og:type">
    {% endif %}
    {% if page.ogimage %}
      <link rel="image_src" href="{{ site.baseurl }}/images/{{ page.ogimage }}" />
      <meta name="twitter:image" content="{{ site.baseurl }}/images/{{ page.ogimage }}">
      <meta content="{{ site.baseurl }}/images/{{ page.ogimage }}" property="og:image" />
    {% else %}
      <link rel="image_src" href="{{ site.baseurl }}/public/ogimage.jpg" />
      <meta name="twitter:image" content="{{ site.baseurl }}/public/ogimage.jpg">
      <meta content="{{ site.baseurl }}/public/ogimage.jpg" property="og:image" />
    {% endif %}
    {% if page.description %}
      <meta content="{{ page.description }}" property="og:description">
      <meta name="twitter:description" content="{{ page.description }}">
    {% else %}
      <meta content="{{ site.description }}" property="og:description">
      <meta name="twitter:description" content="{{ site.description }}">
    {% endif %}
    {% if page.url %}
      <meta property="twitter:url" content="{{ site.baseurl }}{{ page.url }}" />
      <meta content="{{ site.baseurl }}{{ page.url }}" property="og:url">
    {% endif %}
    {% if page.date %}
      <meta content="{{ page.date | date_to_xmlschema }}" property="article:published_time">
      <meta content="{{ site.baseurl }}/about/" property="article:author">
    {% endif %}
  </head>
<body>
  <div class="container">
    {{ content }}
  </div>
</body>
<script>
  (function(i,s,o,g,r,a,m){i['GoogleAnalyticsObject']=r;i[r]=i[r]||function(){
  (i[r].q=i[r].q||[]).push(arguments)},i[r].l=1*new Date();a=s.createElement(o),
  m=s.getElementsByTagName(o)[0];a.async=1;a.src=g;m.parentNode.insertBefore(a,m)
  })(window,document,'script','https://www.google-analytics.com/analytics.js','ga');

  ga('create', 'UA-8657913-8', 'auto');
  ga('send', 'pageview');

</script>
</html>
